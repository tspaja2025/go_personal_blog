{{define "content"}}
<div>
  <h1>{{.Title}}</h1>

  {{if .Errors}}
  <div>
    <ul>
      {{range .Errors}}
      <li>{{.}}</li>
      {{end}}
    </ul>
  </div>
  {{end}}

  <form
    action="{{if .Post.ID}}/admin/posts/update{{else}}/admin/posts/create{{end}}"
    method="POST"
  >
    {{if .Post.ID}}
    <input type="hidden" name="id" value="{{.Post.ID}}" />
    {{end}}

    <div>
      <label for="title">Title *</label>
      <input
        type="text"
        id="title"
        name="title"
        value="{{.Post.Title}}"
        required
      />
      <small>Minimum 3 characters, maximum 200 characters</small>
    </div>

    <div>
      <label for="content">Content *</label>
      <textarea id="content" name="content" rows="10" required>
{{.Post.Content}}</textarea
      >
      <small>Minimum 10 characters, maximum 50000 characters</small>
    </div>

    <div>
      <label>
        <input
          type="checkbox"
          name="published"
          {{if
          .Post.Published}}checked{{end}}
        />
        Publish immediately
      </label>
    </div>

    <div>
      <button type="submit">Save Post</button>
      <a href="/">Cancel</a>
    </div>
  </form>
</div>
{{end}}
